<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
    <title>WorkFlow Pro | Deliverables Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    
    <style>
        :root {
            /* Modernized Palette */
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #334155;
            --accent: #6366f1; /* Premium Indigo */
            --accent-glow: rgba(99, 102, 241, 0.2);
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #334155;
            --radius: 12px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --green: #10b981;
            --red: #ef4444;
        }

        /* Light Mode Overrides */
        body.light {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface2: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; transition: background 0.3s; }

        /* Premium Header */
        header {
            background: var(--surface);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-family: 'DM Serif Display', serif; font-size: 1.5rem; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        /* Dashboard Cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .stat-val { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .stat-label { color: var(--muted); font-size: 0.875rem; text-transform: uppercase; }

        /* Task Table Styling */
        .content-wrap { padding: 0 2rem 2rem; }
        .table-container {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            background: var(--surface2); 
            padding: 1rem; 
            text-align: left; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: var(--muted);
        }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        tr:hover { background: var(--surface2); }

        /* Modern Buttons */
        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }
        
        .btn-add:hover { opacity: 0.9; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }
        .empty-state h3 { color: var(--text); margin-bottom: 1rem; }

        /* Pro Badge */
        .pro-badge {
            background: linear-gradient(45deg, #f59e0b, #d97706);
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            vertical-align: middle;
            margin-left: 5px;
        }
    </style>
</head>
<body class="dark">
    <header>
        <div class="logo">WorkFlow<span>Pro</span><span class="pro-badge">PRO</span></div>
        <div class="header-actions">
            <button class="btn-add" onclick="openModal()">+ New Deliverable</button>
        </div>
    </header>

    <main>
        <section class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-val" id="count-total">24</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" style="color: var(--red);" id="count-urgent">3</div>
                <div class="stat-label">Urgent</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" style="color: var(--green);" id="count-done">12</div>
                <div class="stat-label">Completed</div>
            </div>
        </section>

        <section class="content-wrap">
            <div class="table-container">
                <table id="task-table">
                    <thead>
                        <tr>
                            <th>Deliverable</th>
                            <th>Owner</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="task-list-body">
                        </tbody>
                </table>
                <div id="empty-view" class="empty-state" style="display:none;">
                    <h3>No tasks found</h3>
                    <p>Get started by creating your first deliverable tracker.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Use the logic from your index.html here, ensuring that 
        // you update functions like renderTasks() to target the new table/card structure.
    </script>
</body>
</html>
