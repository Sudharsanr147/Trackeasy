<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
    <title>Work Tracker Pro | Deliverables</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --radius: 16px;
            --green: #10b981;
            --red: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Modern Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span { color: var(--accent); }

        .pro-badge {
            background: linear-gradient(to right, #f59e0b, #d97706);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        /* Dashboard Statistics */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .stat-card h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 0.5rem 0;
        }

        .stat-card .value {
            font-size: 2.2rem;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        /* Content Area */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 5rem;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        /* Modern Task Table */
        .table-wrapper {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.03);
            padding: 1.2rem 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: rgba(255,255,255,0.01); }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .status-done { background: rgba(16, 185, 129, 0.15); color: #10b981; }

        /* Action Buttons */
        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }

        .action-btn:hover { color: var(--text); }
        .action-btn.delete:hover { color: var(--red); }

        /* Floating Action Button for Mobile */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; padding: 1rem; }
            .container { padding: 0 1rem 5rem; }
            th:nth-child(3), td:nth-child(3) { display: none; } /* Hide Owner on small screens */
            .header-actions h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Work<span>Tracker</span> <div class="pro-badge">Pro</div></div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="user-display" style="font-size: 0.8rem; color: var(--text-muted);">Guest User</div>
            <div style="width: 35px; height: 35px; border-radius: 50%; background: var(--surface-hover); border: 1px solid var(--border);"></div>
        </div>
    </nav>

    <section class="stats-grid">
        <div class="stat-card">
            <h3>Active Deliverables</h3>
            <div class="value" id="stat-active">0</div>
        </div>
        <div class="stat-card">
            <h3>Pending Priority</h3>
            <div class="value" id="stat-pending" style="color: #f59e0b;">0</div>
        </div>
        <div class="stat-card">
            <h3>Completion Rate</h3>
            <div class="value" id="stat-rate">0%</div>
        </div>
    </section>

    <div class="container">
        <div class="header-actions">
            <h2 style="font-family: 'DM Serif Display', serif;">My Deliverables</h2>
            <button class="btn-primary" onclick="toggleModal(true)">
                <span>+</span> New Deliverable
            </button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Deliverable</th>
                        <th>Status</th>
                        <th>Owner</th>
                        <th>Due Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tracker-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Your existing Firebase init and data functions 
        // Just make sure to update the element IDs to match the new UI.
        
        // Example dynamic update function for the new stats:
        function updateDashboardStats(total, pending, done) {
            document.getElementById('stat-active').innerText = total;
            document.getElementById('stat-pending').innerText = pending;
            const rate = total > 0 ? Math.round((done / total) * 100) : 0;
            document.getElementById('stat-rate').innerText = rate + "%";
        }
    </script>
</body>
</html>
