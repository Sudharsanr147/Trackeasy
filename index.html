<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
    <style>
        .section { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .section.active { display: block; opacity: 1; transform: translateY(0); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(31, 41, 55, 0.8); }
        .toast { transform: translateX(200%); transition: transform 0.3s ease-in-out; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen font-sans transition-colors duration-300">

    <div id="toast" class="toast fixed top-5 right-5 z-50 bg-green-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center space-x-2">
        <span class="font-bold">✓</span> <span id="toast-msg">Success!</span>
    </div>

    <div class="max-w-5xl mx-auto px-4 pb-20">
        <header class="flex justify-between items-center py-8">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary-600 to-indigo-600">StudioFlow</h1>
                <p class="text-slate-500 text-xs font-medium tracking-widest uppercase mt-1">Professional Tracker</p>
            </div>
            <button onclick="toggleDarkMode()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:border-primary-500 transition-all">
                <span id="dark-icon">🌙</span>
            </button>
        </header>

        <nav class="sticky top-4 z-40 glass p-1.5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xl flex mb-10">
            <button onclick="showSection('add')" class="nav-btn flex-1 py-3 px-2 rounded-xl font-semibold text-sm transition-all" id="btn-add">Capture</button>
            <button onclick="showSection('table')" class="nav-btn flex-1 py-3 px-2 rounded-xl font-semibold text-sm transition-all text-slate-500" id="btn-table">Insights</button>
            <button onclick="showSection('config')" class="nav-btn flex-1 py-3 px-2 rounded-xl font-semibold text-sm transition-all text-slate-500" id="btn-config">Infrastructure</button>
        </nav>

        <main id="add-section" class="section active">
            <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Project</label>
                        <select id="noteProj" onchange="syncBranches('note')" class="w-full bg-slate-50 dark:bg-slate-800 border-none p-4 rounded-2xl focus:ring-2 focus:ring-primary-500 outline-none transition-all"></select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Branch</label>
                        <select id="noteBranch" onchange="syncSubBranches('note')" class="w-full bg-slate-50 dark:bg-slate-800 border-none p-4 rounded-2xl focus:ring-2 focus:ring-primary-500 outline-none transition-all"></select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Sub-Branch</label>
                        <select id="noteSubBranch" class="w-full bg-slate-50 dark:bg-slate-800 border-none p-4 rounded-2xl focus:ring-2 focus:ring-primary-500 outline-none transition-all"></select>
                    </div>
                </div>
                <div class="space-y-2 mb-6">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Daily Log</label>
                    <textarea id="noteInput" rows="6" class="w-full bg-slate-50 dark:bg-slate-800 border-none p-5 rounded-3xl focus:ring-2 focus:ring-primary-500 outline-none transition-all resize-none" placeholder="What progress did you make today?"></textarea>
                </div>
                <button onclick="saveNote()" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-5 rounded-2xl shadow-lg shadow-primary-200 dark:shadow-none transition-all active:scale-[0.99]">
                    Publish Note
                </button>
            </div>
        </main>

        <section id="table-section" class="section space-y-6">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                    <select id="filterProj" onchange="syncBranches('filter'); renderTable();" class="text-sm bg-slate-50 dark:bg-slate-800 p-3 rounded-xl outline-none"></select>
                    <select id="filterBranch" onchange="syncSubBranches('filter'); renderTable();" class="text-sm bg-slate-50 dark:bg-slate-800 p-3 rounded-xl outline-none"></select>
                    <select id="filterSubBranch" onchange="renderTable()" class="text-sm bg-slate-50 dark:bg-slate-800 p-3 rounded-xl outline-none"></select>
                </div>
                <button onclick="exportToHTML()" class="w-full border-2 border-primary-500 text-primary-600 dark:text-primary-400 font-bold py-3 rounded-xl hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-all flex items-center justify-center space-x-2">
                    <span>📥</span> <span>Export AI Context</span>
                </button>
            </div>
            
            <div id="notesContainer" class="space-y-4">
                </div>
        </section>

        <section id="config-section" class="section space-y-8">
            <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800">
                <h2 class="text-xl font-bold mb-6 flex items-center">
                    <span class="w-8 h-8 bg-primary-100 dark:bg-primary-900/30 text-primary-600 rounded-lg flex items-center justify-center mr-3 text-sm">⚙</span>
                    Hierarchy Architect
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="space-y-4">
                        <div class="relative">
                            <input id="newProj" type="text" placeholder="Project Title" class="w-full bg-slate-50 dark:bg-slate-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-primary-500">
                            <button onclick="addItem('projects')" class="absolute right-2 top-2 bg-primary-600 text-white w-10 h-10 rounded-lg font-bold hover:scale-105 transition-transform">+</button>
                        </div>
                        <div id="projList" class="space-y-2"></div>
                    </div>
                    <div class="space-y-4 border-slate-100 dark:border-slate-800 md:border-l md:pl-8">
                        <select id="parentProj" class="w-full bg-slate-100 dark:bg-slate-800 p-3 rounded-xl text-sm outline-none"></select>
                        <div class="relative">
                            <input id="newBranch" type="text" placeholder="Branch Name" class="w-full bg-slate-50 dark:bg-slate-800 p-4 rounded-xl outline-none">
                            <button onclick="addItem('branches')" class="absolute right-2 top-2 bg-primary-600 text-white w-10 h-10 rounded-lg font-bold">+</button>
                        </div>
                        <div id="branchList" class="space-y-2"></div>
                    </div>
                    <div class="space-y-4 border-slate-100 dark:border-slate-800 md:border-l md:pl-8">
                        <select id="parentBranchProj" onchange="updateBranchDrop('parentBranch')" class="w-full bg-slate-100 dark:bg-slate-800 p-3 rounded-xl text-sm outline-none"></select>
                        <select id="parentBranch" class="w-full bg-slate-100 dark:bg-slate-800 p-3 rounded-xl text-sm outline-none"></select>
                        <div class="relative">
                            <input id="newSub" type="text" placeholder="Sub-branch" class="w-full bg-slate-50 dark:bg-slate-800 p-4 rounded-xl outline-none">
                            <button onclick="addItem('subs')" class="absolute right-2 top-2 bg-primary-600 text-white w-10 h-10 rounded-lg font-bold">+</button>
                        </div>
                        <div id="subList" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7cPiyA9ms0fz3waIsGL8076c2AyJiJV0",
            authDomain: "project-notes-fafdc.firebaseapp.com",
            projectId: "project-notes-fafdc",
            storageBucket: "project-notes-fafdc.firebasestorage.app",
            messagingSenderId: "1098284034250",
            appId: "1:1098284034250:web:ec39919d935ed5e47e2c33"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProjs = [], allBranches = [], allSubs = [], allNotes = [];

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        onSnapshot(collection(db, "projects"), (s) => { allProjs = s.docs.map(d => ({id: d.id, ...d.data()})); updateUI(); });
        onSnapshot(collection(db, "branches"), (s) => { allBranches = s.docs.map(d => ({id: d.id, ...d.data()})); updateUI(); });
        onSnapshot(collection(db, "subs"), (s) => { allSubs = s.docs.map(d => ({id: d.id, ...d.data()})); updateUI(); });
        onSnapshot(query(collection(db, "notes"), orderBy("createdAt", "desc")), (s) => { allNotes = s.docs.map(d => ({id: d.id, ...d.data()})); renderTable(); });

        window.addItem = async (type) => {
            if(type === 'projects') {
                const name = document.getElementById('newProj').value;
                if(!name) return;
                const pDoc = await addDoc(collection(db, "projects"), { name });
                await addDoc(collection(db, "branches"), { name: "General", parentId: pDoc.id });
                document.getElementById('newProj').value = '';
                showToast("Project created");
            } else if(type === 'branches') {
                const name = document.getElementById('newBranch').value;
                const pName = document.getElementById('parentProj').value;
                const parentId = allProjs.find(p => p.name === pName)?.id;
                if(!name || !parentId) return;
                const bDoc = await addDoc(collection(db, "branches"), { name, parentId });
                await addDoc(collection(db, "subs"), { name: "General", parentId: bDoc.id });
                document.getElementById('newBranch').value = '';
                showToast("Branch linked");
            } else if(type === 'subs') {
                const name = document.getElementById('newSub').value;
                const bName = document.getElementById('parentBranch').value;
                const parentId = allBranches.find(b => b.name === bName)?.id;
                if(!name || !parentId) return;
                await addDoc(collection(db, "subs"), { name, parentId });
                document.getElementById('newSub').value = '';
                showToast("Sub-branch added");
            }
        };

        window.deleteItem = async (t, id) => { if(confirm("Confirm delete?")) { await deleteDoc(doc(db, t, id)); showToast("Removed"); } };
        window.editItem = async (t, id, old) => { const n = prompt("Rename:", old); if(n) { await updateDoc(doc(db, t, id), { name: n }); showToast("Updated"); } };

        window.saveNote = async () => {
            const text = document.getElementById('noteInput').value;
            if(!text) return;
            await addDoc(collection(db, "notes"), {
                text,
                project: document.getElementById('noteProj').value,
                branch: document.getElementById('noteBranch').value,
                subBranch: document.getElementById('noteSubBranch').value,
                createdAt: serverTimestamp()
            });
            document.getElementById('noteInput').value = '';
            showToast("Note published!");
        };

        window.deleteNote = async (id) => { if(confirm("Delete log?")) { await deleteDoc(doc(db, "notes", id)); showToast("Log cleared"); } };

        function updateUI() {
            fillDrop('noteProj', allProjs);
            fillDrop('parentProj', allProjs);
            fillDrop('parentBranchProj', allProjs);
            fillDrop('filterProj', allProjs, true);
            syncBranches('note');
            syncBranches('filter');
            updateBranchDrop('parentBranch');
            renderList('projList', allProjs, 'projects');
            renderList('branchList', allBranches, 'branches');
            renderList('subList', allSubs, 'subs');
        }

        window.syncBranches = (prefix) => {
            const pName = document.getElementById(prefix + 'Proj').value;
            const pId = allProjs.find(p => p.name === pName)?.id;
            const filtered = allBranches.filter(b => b.parentId === pId);
            fillDrop(prefix + 'Branch', filtered, prefix === 'filter');
            syncSubBranches(prefix);
        };

        window.syncSubBranches = (prefix) => {
            const bName = document.getElementById(prefix + 'Branch').value;
            const bId = allBranches.find(b => b.name === bName)?.id;
            const filtered = allSubs.filter(s => s.parentId === bId);
            fillDrop(prefix + 'SubBranch', filtered, prefix === 'filter');
        };

        window.updateBranchDrop = (targetId) => {
            const pName = document.getElementById('parentBranchProj').value;
            const pId = allProjs.find(p => p.name === pName)?.id;
            const filtered = allBranches.filter(b => b.parentId === pId);
            const el = document.getElementById(targetId);
            el.innerHTML = filtered.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        };

        function fillDrop(id, list, allOpt = false) {
            const el = document.getElementById(id);
            if(!el) return;
            el.innerHTML = (allOpt ? '<option value="">All Contexts</option>' : '') + list.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        function renderList(id, list, type) {
            document.getElementById(id).innerHTML = list.map(i => `
                <div class="group flex justify-between items-center p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl hover:bg-white dark:hover:bg-slate-800 transition-all border border-transparent hover:border-slate-200 dark:hover:border-slate-700 shadow-sm">
                    <span class="text-sm font-medium">${i.name}</span>
                    <div class="flex space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editItem('${type}','${i.id}','${i.name}')" class="p-1 hover:text-primary-500">✏️</button>
                        <button onclick="deleteItem('${type}','${i.id}')" class="p-1 hover:text-red-500">🗑️</button>
                    </div>
                </div>`).join('');
        }

        window.renderTable = () => {
            const fP = document.getElementById('filterProj').value;
            const fB = document.getElementById('filterBranch').value;
            const fS = document.getElementById('filterSubBranch').value;
            const filtered = allNotes.filter(n => (!fP || n.project === fP) && (!fB || n.branch === fB) && (!fS || n.subBranch === fS));
            
            document.getElementById('notesContainer').innerHTML = filtered.map(n => `
                <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-black uppercase tracking-widest text-primary-600 bg-primary-50 dark:bg-primary-900/20 px-2 py-1 rounded-md">${n.project}</span>
                            <p class="text-[10px] font-bold text-slate-400 mt-2">${n.branch} — ${n.subBranch}</p>
                        </div>
                        <button onclick="deleteNote('${n.id}')" class="text-slate-300 hover:text-red-500 transition-colors">✕</button>
                    </div>
                    <p class="text-slate-700 dark:text-slate-300 text-sm leading-relaxed whitespace-pre-wrap">${n.text}</p>
                </div>`).join('');
        };

        window.exportToHTML = () => {
            const fP = document.getElementById('filterProj').value || "Global_Vault";
            const filtered = allNotes.filter(n => 
                (!document.getElementById('filterProj').value || n.project === document.getElementById('filterProj').value) && 
                (!document.getElementById('filterBranch').value || n.branch === document.getElementById('filterBranch').value) && 
                (!document.getElementById('filterSubBranch').value || n.subBranch === document.getElementById('filterSubBranch').value)
            );
            if (filtered.length === 0) return showToast("Nothing to export");

            let rows = filtered.map(n => `<tr><td>${n.project}</td><td>${n.branch}</td><td>${n.subBranch}</td><td>${n.text}</td></tr>`).join('');
            const blob = new Blob([`<html><body><table border="1">${rows}</table></body></html>`], { type: 'text/html' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `SaaS_Export_${fP}.html`; a.click();
        };
    </script>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-section').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-white', 'dark:bg-slate-700', 'text-primary-600', 'shadow-lg');
                b.classList.add('text-slate-500');
            });
            const btn = document.getElementById('btn-' + id);
            btn.classList.add('bg-white', 'dark:bg-slate-700', 'text-primary-600', 'shadow-lg');
            btn.classList.remove('text-slate-500');
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            document.getElementById('dark-icon').innerText = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        }
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
