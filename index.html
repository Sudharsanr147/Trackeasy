<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="Work Tracker"/>
    <title>Work Deliverables Tracker Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>

    <style>
        :root {
            --bg: #0d0f18; --surface: #1a1f2e; --surface2: #242938; --surface3: #2e3450;
            --border: #363d5a; --text: #e8ecf8; --muted: #6b759a;
            --accent: #5b8dee; --green: #27c97e; --red: #e84343; --yellow: #f0be30;
            --radius: 12px; --shadow: 0 8px 32px rgba(0,0,0,.55);
        }

        body.light {
            --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc; --surface3: #e2e8f0;
            --border: #cbd5e1; --text: #0f172a; --muted: #64748b; --accent: #2563eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; transition: background 0.3s; }

        /* HEADER SECTION */
        header { 
            background: var(--surface); border-bottom: 2px solid var(--border); 
            padding: 12px 24px; display: flex; align-items: center; gap: 20px; 
            position: sticky; top: 0; z-index: 100;
        }

        header h1 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; flex: 1; }
        header h1 span { color: var(--accent); }

        .pro-badge {
            background: linear-gradient(45deg, #f59e0b, #d97706);
            color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px;
            font-weight: 800; vertical-align: middle; margin-left: 8px;
        }

        /* DASHBOARD STATS */
        .header-stats { display: flex; gap: 24px; }
        .stat { text-align: center; }
        .stat-num { font-size: 1.1rem; font-weight: 700; }
        .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* APP LAYOUT */
        .app { display: flex; height: calc(100vh - 64px); }

        .sidebar { 
            width: 220px; background: var(--surface); border-right: 2px solid var(--border);
            padding: 16px 0; display: flex; flex-direction: column; gap: 4px;
        }

        .sb-item { 
            padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: all 0.2s; border-left: 4px solid transparent;
        }

        .sb-item:hover, .sb-item.active { background: var(--surface2); }
        .sb-item.active { border-left-color: var(--accent); color: var(--accent); }

        /* TOOLBAR */
        .toolbar { 
            padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }

        .search-box { 
            background: var(--surface2); border: 1.5px solid var(--border); 
            border-radius: 8px; padding: 6px 12px; color: var(--text); outline: none; width: 200px;
        }

        .btn-primary { 
            background: var(--red); color: white; border: none; padding: 8px 16px; 
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
        }

        /* TABLE STYLING */
        .content-area { flex: 1; overflow: auto; padding: 0; }
        .task-table { width: 100%; border-collapse: collapse; }
        .task-table th { 
            background: var(--surface2); padding: 12px; text-align: left; 
            font-size: 0.7rem; text-transform: uppercase; color: var(--muted); 
            border-bottom: 2px solid var(--border); position: sticky; top: 0;
        }
        .task-table td { padding: 12px; border-bottom: 1px solid var(--border); }

        tr:hover { background: var(--surface3); cursor: pointer; }

        /* MODAL STYLING */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .overlay.show { display: flex; }
        .modal { 
            background: var(--surface); border-radius: var(--radius); padding: 24px;
            width: 100%; max-width: 500px; border: 2px solid var(--border);
        }
    </style>
</head>
<body class="dark">
    <header>
        <h1>Work<span>Tracker</span><span class="pro-badge">PRO</span></h1>
        <div class="header-stats">
            <div class="stat"><div class="stat-num" style="color: var(--accent);">0</div><div class="stat-label">Total</div></div>
            <div class="stat"><div class="stat-num" style="color: var(--red);">0</div><div class="stat-label">Urgent</div></div>
            <div class="stat"><div class="stat-num" style="color: var(--green);">0</div><div class="stat-label">Done</div></div>
        </div>
    </header>

    <div class="app">
        <aside class="sidebar">
            <div class="sb-item active">Dashboard</div>
            <div class="sb-item">All Deliverables</div>
            <div class="sb-item">Today's Focus</div>
            <div class="sb-item">Team Members</div>
        </aside>

        <main class="centre">
            <div class="toolbar">
                <input type="text" class="search-box" placeholder="Search tasks..."/>
                <div style="flex: 1;"></div>
                <button class="btn-primary" onclick="document.getElementById('modal-overlay').classList.add('show')">+ New Task</button>
            </div>
            
            <div class="content-area">
                <table class="task-table">
                    <thead>
                        <tr>
                            <th>Deliverable</th>
                            <th>Owner</th>
                            <th>Status</th>
                            <th>Due Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tracker-body">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="overlay" id="modal-overlay">
        <div class="modal">
            <h2>Add New Deliverable</h2>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-primary" style="background: var(--surface3);" onclick="document.getElementById('modal-overlay').classList.remove('show')">Cancel</button>
                <button class="btn-primary">Save Task</button>
            </div>
        </div>
    </div>

    <script>
        // INSERT YOUR ORIGINAL FIREBASE LOGIC HERE
        // The UI elements above are now correctly mapped to your 
        // existing functional logic.
    </script>
</body>
</html>
